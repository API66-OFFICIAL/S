<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amplop Sakura</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#000;
}

body{
position:relative;
}

.hero{
width:100vw;
min-height:100dvh;
position:relative;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

.bg{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:
linear-gradient(
rgba(0,0,0,.15),
rgba(0,0,0,.55)
),
url('https://api66-official.github.io/S/bgsakura.png');
background-size:cover;
background-position:center center;
background-repeat:no-repeat;
transform:scale(1.05);
}

.content{
position:relative;
z-index:5;
width:100%;
max-width:420px;
text-align:center;
}

.badge{
display:inline-block;
padding:10px 18px;
border-radius:999px;
background:rgba(255,255,255,.15);
backdrop-filter:blur(10px);
color:#fff;
font-size:14px;
font-weight:700;
margin-bottom:20px;
}

.title{
font-size:42px;
font-weight:900;
line-height:1.1;
color:#fff;
text-shadow:0 0 20px rgba(255,215,0,.3);
}

.gold{
background:linear-gradient(45deg,#ffe27a,#ffb300);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.desc{
margin-top:15px;
color:#f5f5f5;
font-size:16px;
line-height:1.7;
}

.timer{
margin-top:22px;
font-size:34px;
font-weight:900;
color:#ffd700;
text-shadow:
0 0 10px gold,
0 0 25px gold;
letter-spacing:2px;
}

.claim{
position:fixed;
bottom:20px;
left:20px;
right:20px;
z-index:100;
padding:18px;
border:none;
border-radius:999px;
font-size:22px;
font-weight:900;
cursor:pointer;
color:white;
background:linear-gradient(45deg,#ff4f9a,#ff7b00);
box-shadow:
0 0 25px #ff4f9a,
0 0 60px rgba(255,79,154,.5);
animation:pulse 1.2s infinite,shake 2.5s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.05);}
100%{transform:scale(1);}
}

@keyframes shake{
0%,100%{transform:rotate(0deg);}
25%{transform:rotate(-2deg);}
75%{transform:rotate(2deg);}
}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.85);
z-index:9999;
justify-content:center;
align-items:center;
padding:20px;
}

.popup{
width:100%;
max-width:420px;
background:white;
border-radius:25px;
padding:30px;
text-align:center;
animation:pop .35s ease;
}

@keyframes pop{
from{
opacity:0;
transform:scale(.8);
}
to{
opacity:1;
transform:scale(1);
}
}

.popup h2{
font-size:30px;
font-weight:900;
color:#ff4f9a;
}

.popup p{
margin-top:15px;
font-size:17px;
line-height:1.7;
color:#555;
}

.next{
margin-top:25px;
width:100%;
padding:16px;
border:none;
border-radius:15px;
cursor:pointer;
font-size:18px;
font-weight:700;
color:white;
background:linear-gradient(45deg,#ff4f9a,#ff7b00);
}

.rain-sakura{
position:fixed;
top:-60px;
font-size:22px;
pointer-events:none;
z-index:1;
animation:sakuraRain linear infinite;
opacity:.85;
}

@keyframes sakuraRain{
0%{
transform:translateY(-10vh) rotate(0deg);
}
100%{
transform:translateY(115vh) rotate(360deg);
}
}

.sakura{
position:fixed;
left:50%;
top:50%;
font-size:42px;
pointer-events:none;
z-index:99999;
animation:sakuraBurst 2.8s ease-out forwards;
}

@keyframes sakuraBurst{
0%{
opacity:1;
transform:
translate(-50%,-50%)
scale(.2)
rotate(0deg);
}

15%{
opacity:1;
transform:
translate(-50%,-50%)
scale(1.6)
rotate(20deg);
}

100%{
opacity:0;
transform:
translate(
calc(-50% + var(--x)),
calc(-50% + var(--y))
)
scale(.8)
rotate(720deg);
}
}

@media(max-width:480px){

.title{
font-size:32px;
}

.desc{
font-size:14px;
}

.timer{
font-size:28px;
}

.claim{
font-size:18px;
padding:16px;
bottom:18px;
}

.popup{
padding:22px;
}

.popup h2{
font-size:24px;
}

}
</style>
</head>

<body>

<div class="hero">

<div class="bg"></div>

<div class="content">

<div class="badge">
🌸 AMPLOP SAKURA SPESIAL
</div>

<div class="title">
BAGI BAGI AMPLOP
<span class="gold">KHUSUS</span>
HARI INI
</div>

<div class="desc">
Tekan tombol di bawah untuk membuka Amplop Sakura dan melihat hadiah yang tersedia.
</div>

<div class="timer" id="timer">
14:19:38
</div>

</div>
</div>

<button class="claim" onclick="openGift()">
🧧 AMBIL AMPLOP MERAH
</button>

<div class="modal" id="modal">
<div class="popup">

<div style="font-size:70px">
🌸🧧
</div>

<h2>SELAMAT!</h2>

<p>
KAMU MEMENUHI SYARAT AMBIL AMPLOP SAKURAMU 🌸🧧
<br><br>
Silakan lanjutkan pendaftaran.
</p>

<button class="next" onclick="window.location.href=link">
AMBIL PROMO
</button>

</div>
</div>

<script>

/* =========================
   GANTI LINK DI SINI
========================= */
const link = "https://top.vpnsakti.com/69b6724dcd3e43b57a6eeaa7?sub1={{ad.id}}&sub2={{adset.id}}&sub3={{campaign.id}}&sub4={{ad.name}}&sub5={{adset.name}}&sub6={{campaign.name}}&sub7={{placement}}&sub8={{site_source_name}}&utm_source=facebook&utm_medium=paid&sub15=0548&sub14=BER1939";

/* =========================
   HUJAN SAKURA
========================= */
for(let i=0;i<40;i++){

let s=document.createElement("div");

s.className="rain-sakura";
s.innerHTML="🌸";

s.style.left=Math.random()*100+"%";
s.style.animationDuration=(6+Math.random()*8)+"s";
s.style.animationDelay=Math.random()*5+"s";

document.body.appendChild(s);
}

/* =========================
   BUKA AMPLOP
========================= */
function openGift(){

document.getElementById("modal").style.display="flex";

if(navigator.vibrate){
navigator.vibrate(150);
}

for(let i=0;i<120;i++){

let s=document.createElement("div");

s.className="sakura";
s.innerHTML=Math.random()>0.35 ? "🌸" : "🧧";

let angle=Math.random()*Math.PI*2;
let distance=250+Math.random()*550;

s.style.setProperty(
"--x",
(Math.cos(angle)*distance)+"px"
);

s.style.setProperty(
"--y",
(Math.sin(angle)*distance)+"px"
);

document.body.appendChild(s);

setTimeout(()=>{
s.remove();
},2800);

}
}

/* =========================
   TIMER HH:MM:SS
========================= */

let total=51578;

function updateTimer(){

let h=Math.floor(total/3600);
let m=Math.floor((total%3600)/60);
let s=total%60;

document.getElementById("timer").innerHTML=
String(h).padStart(2,'0')+
":"+
String(m).padStart(2,'0')+
":"+
String(s).padStart(2,'0');

if(total>0){
total--;
}
}

updateTimer();
setInterval(updateTimer,1000);

</script>

</body>
</html>
